# OpenShift Route for external access to ClusterShell
# This template is only applied when .Values.openshift.enabled is true
{{- if .Values.openshift.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "clustershell.fullname" . }}
  labels:
    {{- include "clustershell.labels" . | nindent 4 }}
spec:
  host: {{ .Values.openshift.route.host | default (printf "%s-%s.%s" (include "clustershell.fullname" .) .Release.Namespace .Values.openshift.route.clusterDomain) }}
  to:
    kind: Service
    name: {{ include "clustershell.fullname" . }}
  port:
    targetPort: grpc
  {{- if .Values.openshift.route.tls.enabled }}
  tls:
    termination: {{ .Values.openshift.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.openshift.route.tls.insecureEdgeTerminationPolicy }}
    {{- if .Values.openshift.route.tls.caCertificate }}
    caCertificate: |
      {{ .Values.openshift.route.tls.caCertificate | nindent 6 }}
    {{- end }}
    {{- if .Values.openshift.route.tls.certificate }}
    certificate: |
      {{ .Values.openshift.route.tls.certificate | nindent 6 }}
    {{- end }}
    {{- if .Values.openshift.route.tls.key }}
    key: |
      {{ .Values.openshift.route.tls.key | nindent 6 }}
    {{- end }}
    {{- if .Values.openshift.route.tls.destinationCACertificate }}
    destinationCACertificate: |
      {{ .Values.openshift.route.tls.destinationCACertificate | nindent 6 }}
    {{- end }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
---
# OpenShift Route for SSH access (optional)
{{- if and .Values.openshift.enabled .Values.openshift.route.ssh.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "clustershell.fullname" . }}-ssh
  labels:
    {{- include "clustershell.labels" . | nindent 4 }}
spec:
  host: {{ .Values.openshift.route.ssh.host | default (printf "%s-ssh-%s.%s" (include "clustershell.fullname" .) .Release.Namespace .Values.openshift.route.clusterDomain) }}
  to:
    kind: Service
    name: {{ include "clustershell.fullname" . }}
  port:
    targetPort: ssh
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: None
  wildcardPolicy: None
{{- end }}
