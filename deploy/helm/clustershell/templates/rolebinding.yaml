apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "clustershell.fullname" . }}-sandbox
  labels:
    {{- include "clustershell.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "clustershell.fullname" . }}-sandbox
subjects:
  - kind: ServiceAccount
    name: {{ include "clustershell.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
