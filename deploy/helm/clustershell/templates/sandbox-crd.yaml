# SandboxWarmPool CRD - Pre-warmed sandbox pools
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxwarmpools.agents.x-k8s.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
spec:
  group: agents.x-k8s.io
  names:
    kind: SandboxWarmPool
    listKind: SandboxWarmPoolList
    plural: sandboxwarmpools
    shortNames:
      - sbwarm
    singular: sandboxwarmpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: SandboxWarmPool manages pre-warmed Sandbox pods
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: SandboxWarmPoolSpec defines the desired state
              type: object
              required:
                - templateRef
              properties:
                templateRef:
                  description: templateRef references a SandboxTemplate
                  type: string
                minReady:
                  description: minReady is the minimum number of ready sandboxes
                  type: integer
                  default: 1
                maxSize:
                  description: maxSize is the maximum number of sandboxes
                  type: integer
                  default: 5
                scaleDownDelaySeconds:
                  description: scaleDownDelaySeconds is the delay before scaling down
                  type: integer
                  default: 300
            status:
              description: SandboxWarmPoolStatus defines the observed state
              type: object
              properties:
                readyCount:
                  description: readyCount is the number of ready sandboxes
                  type: integer
                totalCount:
                  description: totalCount is the total number of sandboxes
                  type: integer
                sandboxes:
                  description: sandboxes is the list of sandboxes in the pool
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      state:
                        type: string
                      allocationTime:
                        type: string
                        format: date-time
                conditions:
                  type: array
                  items:
                    type: object
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: integer
          jsonPath: .status.readyCount
        - name: Total
          type: integer
          jsonPath: .status.totalCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
