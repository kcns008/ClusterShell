{{- if .Values.networkPolicy.enabled }}
# NetworkPolicy restricting SSH ingress on sandbox pods to the gateway pod.
# Sandbox pods are dynamically created by the server and labelled with
# clustershell.ai/managed-by=clustershell. This policy ensures only the gateway
# (clustershell server) pod can reach the sandbox SSH port (2222), blocking
# lateral movement from other in-cluster workloads.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clustershell.fullname" . }}-sandbox-ssh
  namespace: {{ .Values.server.sandboxNamespace }}
  labels:
    {{- include "clustershell.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      clustershell.ai/managed-by: clustershell
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "clustershell.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 2222
{{- end }}
