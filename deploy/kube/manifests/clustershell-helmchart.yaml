# HelmChart CR for auto-deploying ClusterShell via k3s Helm controller
# This manifest is placed in /var/lib/rancher/k3s/server/manifests/ and
# automatically installed when the k3s cluster starts.
#
# The chart tarball is served from the k3s static file server at:
# https://<k8s-api>/static/charts/clustershell-0.1.0.tgz
#
# Component images are pulled at runtime from ghcr.io.
# Authentication is configured via /etc/rancher/k3s/registries.yaml
# (containerd-level) and a Kubernetes imagePullSecret (pod-level),
# both generated by the bootstrap process.

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: clustershell
  namespace: kube-system
spec:
  chart: https://%{KUBERNETES_API}%/static/charts/clustershell-0.1.0.tgz
  targetNamespace: clustershell
  createNamespace: true
  valuesContent: |-
    chartChecksum: __CHART_CHECKSUM__
    image:
      repository: ghcr.io/nvidia/clustershell/gateway
      tag: latest
      pullPolicy: Always
    server:
      sandboxImage: ghcr.io/nvidia/clustershell-community/sandboxes/base:latest
      sshGatewayHost: __SSH_GATEWAY_HOST__
      sshGatewayPort: __SSH_GATEWAY_PORT__
      sshHandshakeSecret: __SSH_HANDSHAKE_SECRET__
      grpcEndpoint: "https://clustershell.clustershell.svc.cluster.local:8080"
      hostGatewayIP: __HOST_GATEWAY_IP__
      disableGatewayAuth: __DISABLE_GATEWAY_AUTH__
      disableTls: __DISABLE_TLS__
      tls:
        certSecretName: clustershell-server-tls
        clientCaSecretName: clustershell-server-client-ca
        clientTlsSecretName: clustershell-client-tls
