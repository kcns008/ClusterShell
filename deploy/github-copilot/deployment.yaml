# GitHub Copilot CLI Deployment
# Browser-accessible AI assistant with web terminal (ttyd)
#
# Prerequisites:
# 1. Kubernetes cluster with nginx ingress controller
# 2. cert-manager with a cluster issuer (e.g., letsencrypt-issuer)
# 3. GitHub Personal Access Token with 'repo' and 'copilot' scopes
# 4. Active GitHub Copilot subscription (https://github.com/features/copilot)
#
# Quick Start:
#   kubectl apply -f deployment.yaml
#   kubectl create secret generic github-copilot-token --from-literal=token=YOUR_TOKEN -n github-copilot
#
# Customize:
#   - Change HOSTNAME in ConfigMap to your domain
#   - Update Ingress host and TLS settings
#   - Adjust resource limits as needed

---
apiVersion: v1
kind: Namespace
metadata:
  name: github-copilot
  labels:
    app.kubernetes.io/name: github-copilot
    app.kubernetes.io/managed-by: clustershell
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-copilot-config
  namespace: github-copilot
  labels:
    app: github-copilot-cli
    app.kubernetes.io/name: github-copilot-cli
    app.kubernetes.io/managed-by: clustershell
data:
  TTYD_PORT: "7681"
  # Change this to your domain
  HOSTNAME: "copilot.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: github-copilot-token
  namespace: github-copilot
  labels:
    app: github-copilot-cli
    app.kubernetes.io/name: github-copilot-cli
    app.kubernetes.io/managed-by: clustershell
type: Opaque
stringData:
  # Create with: kubectl create secret generic github-copilot-token --from-literal=token=<YOUR_TOKEN> -n github-copilot
  # Required scopes: repo, copilot
  # Note: Requires active GitHub Copilot subscription
  token: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-copilot-cli
  namespace: github-copilot
  labels:
    app: github-copilot-cli
    app.kubernetes.io/name: github-copilot-cli
    app.kubernetes.io/component: ai-assistant
    app.kubernetes.io/managed-by: clustershell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-copilot-cli
  template:
    metadata:
      labels:
        app: github-copilot-cli
    spec:
      containers:
      - name: copilot-cli
        image: alpine:3.19
        envFrom:
        - configMapRef:
            name: github-copilot-config
        env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-copilot-token
              key: token
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-copilot-token
              key: token
              optional: true
        command: 
        - /bin/sh
        - -c
        - |
          set -e
          
          # Install dependencies
          echo "Installing dependencies..."
          apk add --no-cache git curl bash nodejs npm ttyd
          
          # Install GitHub CLI
          echo "Installing GitHub CLI..."
          GH_VERSION="2.40.1"
          curl -sSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o /tmp/gh.tar.gz
          tar -xzf /tmp/gh.tar.gz -C /tmp
          cp "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
          chmod +x /usr/local/bin/gh
          rm -rf /tmp/gh*
          
          # Install GitHub Copilot CLI
          echo "Installing GitHub Copilot CLI..."
          npm install -g @githubnext/github-copilot-cli
          ln -sf /usr/local/bin/github-copilot-cli /usr/local/bin/copilot
          
          # Configure GitHub CLI if token is available
          if [ -n "$GH_TOKEN" ]; then
            echo "Configuring GitHub CLI with token..."
            echo "$GH_TOKEN" | gh auth login --with-token
            gh auth status || echo "Note: Token may need additional scopes"
            
            # Create Copilot config
            mkdir -p /root/.config/github-copilot
            echo "$GH_TOKEN" > /root/.config/github-copilot/token
            chmod 600 /root/.config/github-copilot/token
            echo "Copilot CLI ready!"
          else
            echo "Warning: No GitHub token. Run 'gh auth login' manually."
          fi
          
          # Setup shell aliases
          cat > /root/.bashrc << 'EOF'
          # GitHub Copilot CLI aliases
          alias wts='copilot what-the-shell'
          alias ga='copilot git-assist'
          alias gha='copilot gh-assist'
          
          copilot-help() {
            echo "GitHub Copilot CLI Commands:"
            echo "  wts 'query'   - Shell commands from natural language"
            echo "  ga 'query'    - Git commands from descriptions"
            echo "  gha 'query'   - GitHub CLI commands"
            echo ""
            echo "Example: wts 'find all files larger than 100MB'"
          }
          EOF
          
          echo ""
          echo "=========================================="
          echo "GitHub CLI: $(gh version --short 2>/dev/null)"
          echo "Copilot CLI: $(copilot --version 2>&1 | head -1)"
          echo "Web Terminal: https://${HOSTNAME}"
          echo "=========================================="
          echo ""
          
          # Start web terminal
          exec ttyd -W -p ${TTYD_PORT:-7681} /bin/bash
        ports:
        - containerPort: 7681
          name: web-terminal
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 7681
          initialDelaySeconds: 120
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 7681
          initialDelaySeconds: 90
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: github-copilot-cli
  namespace: github-copilot
  labels:
    app: github-copilot-cli
spec:
  selector:
    app: github-copilot-cli
  ports:
  - name: web-terminal
    port: 7681
    targetPort: 7681
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-copilot-cli
  namespace: github-copilot
  labels:
    app: github-copilot-cli
  annotations:
    # Update cluster-issuer name to match your cert-manager setup
    cert-manager.io/cluster-issuer: letsencrypt-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/websocket-services: github-copilot-cli
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  # Change to your domain
  - host: copilot.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: github-copilot-cli
            port:
              number: 7681
  tls:
  # Change to your domain
  - hosts:
    - copilot.example.com
    secretName: github-copilot-cli-tls
