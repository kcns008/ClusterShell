# GitHub Copilot CLI Deployment for OpenShift
# Includes web terminal (ttyd) and auto-authentication
#
# Prerequisites:
# 1. Create secret: oc create secret generic github-copilot-token --from-literal=token=<YOUR_GITHUB_TOKEN> -n github-copilot
# 2. Ensure OpenShift router is configured

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-copilot-config
  namespace: github-copilot
  labels:
    app: github-copilot-cli
    app.kubernetes.io/name: github-copilot-cli
    app.kubernetes.io/managed-by: clustershell
data:
  TTYD_PORT: "7681"
  HOSTNAME: "copilot.apps.your-openshift-domain.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: github-copilot-token
  namespace: github-copilot
  labels:
    app: github-copilot-cli
    app.kubernetes.io/name: github-copilot-cli
    app.kubernetes.io/managed-by: clustershell
type: Opaque
stringData:
  # GitHub Personal Access Token with repo and copilot scopes
  # Create with: kubectl create secret generic github-copilot-token --from-literal=token=<YOUR_TOKEN> -n github-copilot
  # Required scopes: repo, copilot
  # Note: Requires active GitHub Copilot subscription
  token: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-copilot-cli
  namespace: github-copilot
  labels:
    app: github-copilot-cli
    app.kubernetes.io/name: github-copilot-cli
    app.kubernetes.io/component: ai-assistant
    app.kubernetes.io/managed-by: clustershell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-copilot-cli
  template:
    metadata:
      labels:
        app: github-copilot-cli
    spec:
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: copilot-cli
        image: alpine:3.19
        envFrom:
        - configMapRef:
            name: github-copilot-config
        env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-copilot-token
              key: token
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-copilot-token
              key: token
              optional: true
        command: 
        - /bin/sh
        - -c
        - |
          # Install dependencies (don't fail on individual errors)
          echo "Installing dependencies..."
          apk add --no-cache git curl bash nodejs npm ttyd || { echo "Failed to install dependencies"; exit 1; }
          
          # Install GitHub CLI
          echo "Installing GitHub CLI..."
          curl -sSL https://github.com/cli/cli/releases/download/v2.40.1/gh_2.40.1_linux_amd64.tar.gz -o /tmp/gh.tar.gz
          tar -xzf /tmp/gh.tar.gz -C /tmp
          cp /tmp/gh_2.40.1_linux_amd64/bin/gh /usr/local/bin/gh
          chmod +x /usr/local/bin/gh
          rm -rf /tmp/gh*
          
          # Install GitHub Copilot CLI
          echo "Installing GitHub Copilot CLI..."
          npm install -g @githubnext/github-copilot-cli
          
          # Create copilot symlink
          ln -sf /usr/local/bin/github-copilot-cli /usr/local/bin/copilot
          
          # Configure gh CLI if token is available
          if [ -n "$GH_TOKEN" ]; then
            echo "Configuring GitHub CLI with token..."
            echo "$GH_TOKEN" | gh auth login --with-token
            gh auth status || echo "Note: Token may need additional scopes for some features"
            echo "Copilot CLI ready. Run 'copilot auth' if needed."
          else
            echo "Warning: No GitHub token provided. Run 'gh auth login' manually."
          fi
          
          # Create bashrc with aliases
          echo '# GitHub Copilot CLI aliases' > /root/.bashrc
          echo "alias wts='copilot what-the-shell'" >> /root/.bashrc
          echo "alias ga='copilot git-assist'" >> /root/.bashrc
          echo "alias gha='copilot gh-assist'" >> /root/.bashrc
          echo '' >> /root/.bashrc
          echo 'copilot-help() {' >> /root/.bashrc
          echo '  echo "GitHub Copilot CLI Commands:"' >> /root/.bashrc
          echo '  echo "  wts \"query\"  - Shell commands from natural language"' >> /root/.bashrc
          echo '  echo "  ga \"query\"   - Git commands from descriptions"' >> /root/.bashrc
          echo '  echo "  gha \"query\"  - GitHub CLI commands"' >> /root/.bashrc
          echo '}' >> /root/.bashrc
          
          echo ""
          echo "=========================================="
          echo "GitHub CLI: $(gh version --short 2>/dev/null || echo 'installed')"
          echo "Copilot CLI: $(copilot --version 2>&1 | head -1 || echo 'installed')"
          echo "Web Terminal: https://${HOSTNAME:-copilot.apps.your-domain.com}"
          echo "=========================================="
          echo ""
          echo "Type 'copilot-help' for usage information"
          echo ""
          
          # Start ttyd for web terminal access
          exec ttyd -W -p 7681 /bin/bash
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 7681
          name: web-terminal
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 7681
          initialDelaySeconds: 120
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 7681
          initialDelaySeconds: 90
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: github-copilot-cli
  namespace: github-copilot
  labels:
    app: github-copilot-cli
spec:
  selector:
    app: github-copilot-cli
  ports:
  - name: web-terminal
    port: 7681
    targetPort: 7681
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: github-copilot-cli
  namespace: github-copilot
  labels:
    app: github-copilot-cli
  annotations:
    haproxy.router.openshift.io/timeout: "1h"
    haproxy.router.openshift.io/websocket: "true"
spec:
  host: copilot.apps.your-openshift-domain.com
  to:
    kind: Service
    name: github-copilot-cli
  port:
    targetPort: web-terminal
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
