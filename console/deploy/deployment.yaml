---
apiVersion: v1
kind: Namespace
metadata:
  name: clustershell-console
  labels:
    app.kubernetes.io/name: clustershell-console
    app.kubernetes.io/managed-by: clustershell
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clustershell-console
  namespace: clustershell-console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clustershell-console
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec", "services", "namespaces", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clustershell-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clustershell-console
subjects:
- kind: ServiceAccount
  name: clustershell-console
  namespace: clustershell-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustershell-console
  namespace: clustershell-console
  labels:
    app: clustershell-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clustershell-console
  template:
    metadata:
      labels:
        app: clustershell-console
    spec:
      serviceAccountName: clustershell-console
      containers:
      - name: console
        image: docker.io/clustershell/console:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: clustershell-console
  namespace: clustershell-console
spec:
  selector:
    app: clustershell-console
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clustershell-console
  namespace: clustershell-console
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/websocket-services: clustershell-console
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - host: console.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clustershell-console
            port:
              number: 8080
  tls:
  - hosts:
    - console.example.com
    secretName: clustershell-console-tls
