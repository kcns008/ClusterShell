# TUI tasks

[term]
description = "Launch the ClusterShell TUI"
run = "clustershell term"
hide = true

["term:dev"]
description = "Launch the ClusterShell TUI with hot-reload on file changes"
run = "cargo watch -s 'clustershell term'"
hide = true
